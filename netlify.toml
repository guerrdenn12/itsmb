[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/worktrack-vs-tsheets"
  to = "/worktrack-vs-tsheets.html"
  status = 200

[[redirects]]
  from = "/worktrack-vs-homebase"
  to = "/worktrack-vs-homebase.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "https://app.worktracksmb.com/landing"
  status = 301
  force = true

[[redirects]]
  from = "/checkout-success"
  to = "/checkout-success.html"
  status = 200
